name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      # Built with base '/' for root deployment (local / Mac Mini release).
      # NOT usable under the GitHub Pages /listy/ subpath — deploy-pages.yml
      # rebuilds with BASE_PATH=/listy/ for that.
      - name: Build (root base path)
        run: npx vite build
        env:
          BASE_PATH: '/'

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: listy-dist-root-${{ github.sha }}
          path: dist/
          retention-days: 14
