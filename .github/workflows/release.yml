name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and attach dist tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, test
        run: npm run lint && npm run typecheck && npm run test

      - name: Build
        run: npx vite build

      - name: Package dist
        run: tar -czf listy-${{ github.ref_name }}.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: listy-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
