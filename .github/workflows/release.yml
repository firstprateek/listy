name: Release

on:
  push:
    tags: ['v*']

# Serialize releases for the same tag without cancelling an in-flight upload.
concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write

jobs:
  release:
    name: Build and attach dist tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, test
        run: npm run lint && npm run typecheck && npm run test

      - name: Build
        run: npx vite build

      - name: Package dist
        run: |
          tar -czf listy-${{ github.ref_name }}.tar.gz -C dist .
          sha256sum listy-${{ github.ref_name }}.tar.gz > listy-${{ github.ref_name }}.tar.gz.sha256

      - name: Create GitHub Release
        # Third-party action pinned to a commit SHA (v3) — a write-token job
        # must not run a mutable floating tag. Bump the SHA when updating.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            listy-${{ github.ref_name }}.tar.gz
            listy-${{ github.ref_name }}.tar.gz.sha256
          generate_release_notes: true
